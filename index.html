<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Why Did I Walk In Here?</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <style>
        * {margin: 0; padding: 0; box-sizing: border-box;}
        body {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px;}
        .container {width: 100%; max-width: 500px; text-align: center;}
        h1 {font-size: 2rem; margin-bottom: 8px; font-weight: 700;}
        .subtitle {color: #94a3b8; margin-bottom: 32px; font-size: 1rem;}
        #taskDisplay {background: #1e293b; border: 2px solid #334155; border-radius: 16px; padding: 40px 24px; margin-bottom: 24px; min-height: 120px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; font-weight: 600; word-break: break-word;}
        #taskDisplay.empty {color: #64748b; font-style: italic;}
        input {width: 100%; padding: 16px; font-size: 1.1rem; background: #1e293b; border: 2px solid #334155; border-radius: 12px; color: #f1f5f9; margin-bottom: 12px; outline: none;}
        input:focus {border-color: #3b82f6;}
        button {width: 100%; padding: 16px; font-size: 1.1rem; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; margin-bottom: 12px; transition: all 0.2s;}
        #saveBtn {background: #3b82f6; color: white;}
        #saveBtn:hover {background: #2563eb;}
        #clearBtn {background: #334155; color: #f1f5f9;}
        #clearBtn:hover {background: #475569;}
        .tip {margin-top: 32px; font-size: 0.9rem; color: #64748b; line-height: 1.5;}
        .tip strong {color: #94a3b8;}
    </style>
</head>
<body>
    <div class="container">
        <h1>Why Did I Walk In Here?</h1>
        <p class="subtitle">For when doorways eat your brain</p>
        <div id="taskDisplay" class="empty">Nothing saved yet</div>
        <input type="text" id="taskInput" placeholder="What are you doing? e.g. grab phone charger" maxlength="100">
        <button id="saveBtn">Save This Task</button>
        <button id="clearBtn">Clear</button>
        <p class="tip"><strong>How to use:</strong> Before you leave a room, type what you're doing. When you arrive and forget, check this site. It saves on your phone automatically.</p>
    </div>
    <script>
        const taskDisplay = document.getElementById('taskDisplay');
        const taskInput = document.getElementById('taskInput');
        const saveBtn = document.getElementById('saveBtn');
        const clearBtn = document.getElementById('clearBtn');
        function loadTask() {const saved = localStorage.getItem('currentTask'); if (saved) {taskDisplay.textContent = saved; taskDisplay.classList.remove('empty');} else {taskDisplay.textContent = 'Nothing saved yet'; taskDisplay.classList.add('empty');}}
        function saveTask() {const task = taskInput.value.trim(); if (task) {localStorage.setItem('currentTask', task); loadTask(); taskInput.value = ''; taskInput.blur();}}
        function clearTask() {localStorage.removeItem('currentTask'); loadTask(); taskInput.value = '';}
        saveBtn.addEventListener('click', saveTask);
        clearBtn.addEventListener('click', clearTask);
        taskInput.addEventListener('keypress', (e) => {if (e.key === 'Enter') saveTask();});
        loadTask();
        if ('serviceWorker' in navigator) {navigator.serviceWorker.register('/sw.js');}
    </script>
</body>
</html>
